name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'mobile-v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android project
        run: flutter create . --platforms=android

      - name: Build release APK
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --dart-define=API_BASE_URL=${API_BASE_URL:-https://urbanfix.vercel.app}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: urbanfix-mobile-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
